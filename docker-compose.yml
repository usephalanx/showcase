version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phalanx-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${JWT_SECRET:-dev-secret-key-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./kanban.db}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80,http://localhost
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    volumes:
      - backend-data:/app
    networks:
      - phalanx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: phalanx-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - phalanx-network
    restart: unless-stopped

volumes:
  backend-data:
    driver: local

networks:
  phalanx-network:
    driver: bridge
