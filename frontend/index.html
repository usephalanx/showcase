<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Manager</h1>
        </header>

        <main>
            <!-- Error banner -->
            <div id="error-banner" class="error-banner" role="alert" hidden>
                <span id="error-message"></span>
                <button id="error-close" class="error-close" aria-label="Dismiss error">&times;</button>
            </div>

            <!-- Create task form -->
            <section class="form-section">
                <h2>New Task</h2>
                <form id="task-form" novalidate>
                    <div class="form-group">
                        <label for="task-title">Title <span class="required">*</span></label>
                        <input
                            type="text"
                            id="task-title"
                            name="title"
                            placeholder="Enter task title"
                            required
                            maxlength="200"
                            autocomplete="off"
                        />
                    </div>
                    <div class="form-group">
                        <label for="task-description">Description</label>
                        <textarea
                            id="task-description"
                            name="description"
                            placeholder="Optional description"
                            rows="3"
                            maxlength="1000"
                        ></textarea>
                    </div>
                    <button type="submit" id="submit-btn" class="btn btn-primary">Add Task</button>
                </form>
            </section>

            <!-- Task list -->
            <section class="list-section">
                <h2>Tasks</h2>
                <div id="loading-indicator" class="loading" hidden>
                    <span>Loading tasks&hellip;</span>
                </div>
                <ul id="task-list" class="task-list"></ul>
                <p id="empty-message" class="empty-message" hidden>No tasks yet. Create one above!</p>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
