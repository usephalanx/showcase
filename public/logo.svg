<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b6cb0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c6973b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a74a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" />
  <!-- Inner circle border -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#grad2)" stroke-width="3" />
  <!-- House roof -->
  <polygon points="100,35 45,85 155,85" fill="url(#grad2)" />
  <!-- House body -->
  <rect x="55" y="85" width="90" height="65" fill="#ffffff" opacity="0.95" rx="2" />
  <!-- Door -->
  <rect x="85" y="110" width="30" height="40" fill="url(#grad1)" rx="2" />
  <!-- Door knob -->
  <circle cx="108" cy="132" r="3" fill="url(#grad2)" />
  <!-- Left window -->
  <rect x="62" y="95" width="18" height="18" fill="url(#grad1)" rx="2" />
  <!-- Right window -->
  <rect x="120" y="95" width="18" height="18" fill="url(#grad1)" rx="2" />
  <!-- Window cross lines left -->
  <line x1="71" y1="95" x2="71" y2="113" stroke="#ffffff" stroke-width="1.5" />
  <line x1="62" y1="104" x2="80" y2="104" stroke="#ffffff" stroke-width="1.5" />
  <!-- Window cross lines right -->
  <line x1="129" y1="95" x2="129" y2="113" stroke="#ffffff" stroke-width="1.5" />
  <line x1="120" y1="104" x2="138" y2="104" stroke="#ffffff" stroke-width="1.5" />
  <!-- M letter -->
  <text x="100" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="url(#grad2)">M</text>
</svg>